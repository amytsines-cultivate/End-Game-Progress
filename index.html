<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5th Grade Math Data Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px; 
            background-color: #f0f2f5; 
            color: #333;
        }
        .header-container { text-align: center; margin-bottom: 30px; }
        h1 { margin: 0; font-size: 2.5rem; letter-spacing: 1px; color: #1a1a1a; }
        .subtitle { font-size: 1.1rem; color: #555; text-transform: uppercase; letter-spacing: 3px; margin-top: 5px; }

        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 750px; 
        }
        .input-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
            margin-bottom: 25px; 
        }
        /* Mobile responsive adjustment */
        @media (max-width: 600px) { .input-grid { grid-template-columns: 1fr 1fr; } }

        .field { display: flex; flex-direction: column; }
        .field.gold { grid-column: span 4; margin-bottom: 10px; } /* Highlight the goal input */
        @media (max-width: 600px) { .field.gold { grid-column: span 2; } }

        label { font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; color: #666; }
        input { 
            padding: 10px; 
            border: 2px solid #e0e0e0; 
            border-radius: 6px; 
            font-size: 1rem;
        }
        input:focus { outline: none; border-color: #FFD700; }
        
        button { 
            width: 100%; 
            padding: 15px; 
            background: #222; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 1.1rem; 
            font-weight: bold;
            cursor: pointer; 
            margin-top: 10px;
        }
        button:hover { background: #444; }
        canvas { margin-top: 30px; }
    </style>
</head>
<body>

<div class="header-container">
    <h1>5th Grade Math Data</h1>
    <div class="subtitle">Data Reflection</div>
</div>

<div class="container">
    <div class="input-grid">
        <div class="field gold">
            <label style="color: #b8860b;">GOLD PROJECTION (GOAL %)</label>
            <input type="number" id="projection" value="85">
        </div>
        <div class="field">
            <label>QUARTER 1</label>
            <input type="number" id="qt1" value="25">
        </div>
        <div class="field">
            <label>QUARTER 2</label>
            <input type="number" id="qt2" value="40">
        </div>
        <div class="field">
            <label>QUARTER 3</label>
            <input type="number" id="qt3" value="60">
        </div>
    </div>
    
    <button onclick="updateChart()">Click here to see Data Trend.</button>
    
    <canvas id="myChart"></canvas>
</div>

<script>
    let myChart;

    function updateChart() {
        const projection = document.getElementById('projection').value;
        const qt1 = document.getElementById('qt1').value;
        const qt2 = document.getElementById('qt2').value;
        const qt3 = document.getElementById('qt3').value;

        const ctx = document.getElementById('myChart').getContext('2d');

        if (myChart) { myChart.destroy(); }

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Quarter 1', 'Quarter 2', 'Quarter 3'],
                datasets: [
                    {
                        label: 'Actual Progress',
                        data: [qt1, qt2, qt3],
                        borderColor: '#333',
                        backgroundColor: 'rgba(51, 51, 51, 0.1)',
                        borderWidth: 4,
                        pointRadius: 6,
                        pointBackgroundColor: '#fff',
                        zIndex: 10 // Keep progress on top
                    },
                    {
                        label: 'Gold Projection',
                        data: [projection, projection, projection],
                        borderColor: '#FFD700',
                        borderWidth: 5,
                        pointRadius: 0,
                        fill: false,
                    },
                    /* CONSTANT ZONE LINES */
                    {
                        label: 'Purple Zone (78%)',
                        data: [78, 78, 78],
                        borderColor: 'purple',
                        borderDash: [5, 5],
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false
                    },
                    {
                        label: 'Blue Zone (58%)',
                        data: [58, 58, 58],
                        borderColor: 'blue',
                        borderDash: [5, 5],
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false
                    },
                    {
                        label: 'Green Zone (38%)',
                        data: [38, 38, 38],
                        borderColor: 'green',
                        borderDash: [5, 5],
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false
                    },
                    {
                        label: 'Orange Zone (27%)',
                        data: [27, 27, 27],
                        borderColor: 'orange',
                        borderDash: [5, 5],
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false
                    }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    y: { 
                        beginAtZero: true, 
                        max: 100,
                        title: { display: true, text: 'Percentage Score' }
                    }
                },
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { boxWidth: 12, padding: 15 }
                    }
                }
            }
        });
    }

    updateChart();
</script>

</body>
</html>
