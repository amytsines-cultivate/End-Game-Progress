<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOAL SHEET PROGRESS</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine } = Recharts;

        function App() {
            const [scores, setScores] = useState(() => {
                const saved = localStorage.getItem('studentGoalData');
                return saved ? JSON.parse(saved) : { projection: '', qt1: '', qt2: '', qt3: '' };
            });

            useEffect(() => {
                localStorage.setItem('studentGoalData', JSON.stringify(scores));
            }, [scores]);

            const handleChange = (e) => {
                setScores({...scores, [e.target.name]: e.target.value});
            };

            const chartData = [
                { name: 'QT1', score: scores.qt1 ? parseInt(scores.qt1) : null },
                { name: 'QT2', score: scores.qt2 ? parseInt(scores.qt2) : null },
                { name: 'QT3', score: scores.qt3 ? parseInt(scores.qt3) : null }
            ];

            return (
                <div className="max-w-4xl mx-auto space-y-6">
                    <div className="bg-white p-6 rounded-xl shadow-md border border-slate-200">
                        <h1 className="text-2xl font-bold mb-6 text-center text-blue-800">GOAL SHEET PROGRESS</h1>
                        
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                            {[
                                { label: "PROJECTION SCORE", name: "projection" },
                                { label: "QT1 SCORE", name: "qt1" },
                                { label: "QT2 SCORE", name: "qt2" },
                                { label: "QT3 SCORE", name: "qt3" }
                            ].map((item) => (
                                <div key={item.name} className="flex flex-col">
                                    <label className="text-xs font-bold text-slate-500 mb-1">{item.label}</label>
                                    <select 
                                        name={item.name} 
                                        value={scores[item.name]} 
                                        onChange={handleChange}
                                        className="p-2 border-2 border-blue-100 rounded-lg focus:border-blue-500 outline-none bg-white"
                                    >
                                        <option value="">Select</option>
                                        {[...Array(101).keys()].map(n => <option key={n} value={n}>{n}</option>)}
                                    </select>
                                </div>
                            ))}
                        </div>

                        <div className="h-64 w-full">
                            <ResponsiveContainer>
                                <LineChart data={chartData}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                    <XAxis dataKey="name" />
                                    <YAxis domain={[0, 100]} />
                                    <Tooltip />
                                    {scores.projection && (
                                        <ReferenceLine y={parseInt(scores.projection)} stroke="orange" strokeDasharray="3 3" label="Goal" />
                                    )}
                                    <Line type="monotone" dataKey="score" stroke="#2563eb" strokeWidth={4} connectNulls />
                                </LineChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
